<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HKO Weather Fetcher</title>
</head>
<body>
    <script>
        /**
         * Fetches real-time weather data from the Hong Kong Observatory Open Data API.
         * Filters for specific locations: "Hong Kong Observatory" for temp and "Yau Tsim Mong" for rain.
         */
        async function fetchHKWeather() {
            const baseUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php';
            
            try {
                // Fetch data from three primary HKO endpoints
                const [currentRes, localRes, nineDayRes] = await Promise.all([
                    fetch(`${baseUrl}?dataType=rhrread&lang=en`),
                    fetch(`${baseUrl}?dataType=flw&lang=en`),
                    fetch(`${baseUrl}?dataType=fnd&lang=en`)
                ]);

                const current = await currentRes.json();
                const local = await localRes.json();
                const nineDay = await nineDayRes.json();

                // 1. Find temperature specifically for "Hong Kong Observatory"
                const hkoTemp = current.temperature?.data?.find(item => item.place === "Hong Kong Observatory");
                
                // 2. Find rainfall specifically for "Yau Tsim Mong"
                const ytmRainfall = current.rainfall?.data?.find(item => item.place === "Yau Tsim Mong");

                // Extract general humidity (first available station)
                const currentHumidity = current.humidity?.data?.[0];

                // Compile result object for the AI Agent
                const result = {
                    source: "Hong Kong Observatory",
                    current_conditions: {
                        temperature: hkoTemp ? `${hkoTemp.value}°${hkoTemp.unit}` : "Data unavailable for HKO station",
                        humidity: currentHumidity ? `${currentHumidity.value}%` : "Data unavailable",
                        rainfall_ytm: ytmRainfall ? `${ytmRainfall.max} ${ytmRainfall.unit}` : "0 mm",
                        warnings: (current.warningMessage && current.warningMessage.length > 0) ? current.warningMessage : ["No active warnings."]
                    },
                    local_forecast: {
                        general_situation: local.generalSituation || "Data unavailable",
                        description: local.forecastDesc || "Data unavailable",
                        outlook: local.outlook || "Data unavailable"
                    },
                    upcoming_forecast: nineDay.weatherForecast?.slice(0, 4).map(day => ({
                        date: day.forecastDate,
                        day_of_week: day.week,
                        weather: day.forecastWeather,
                        temperature_range: `${day.forecastMintemp?.value}°C to ${day.forecastMaxtemp?.value}°C`,
                        humidity_range: `${day.forecastMinrh?.value}% to ${day.forecastMaxrh?.value}%`
                    })) || []
                };

                const output = JSON.stringify(result, null, 2);

                // Write to body for the AI Edge Gallery app to capture
                document.body.innerText = output;
                return output;

            } catch (error) {
                document.body.innerText = JSON.stringify({ 
                    error: "Failed to connect to HKO API", 
                    details: error.message 
                });
                return JSON.stringify({ error: "Failed to connect to HKO API" });
            }
        };
        window["ai_edge_gallery_get_result"] = async (data) => {
            try {
                const jsonData = JSON.parse(data);
                //if (!jsonData.topic) return JSON.stringify({ error: "No topic provided to search." });
                //if (!jsonData.lang) return JSON.stringify({ error: "No language code (lang) provided." });
                const wikiResponse = await fetchHKWeather();
                return JSON.stringify(wikiResponse);
            } catch (e) {
                console.error(e);
                return JSON.stringify({ error: `Failed to query HKO API: ${e.message}` });
            }
        };

    </script>
</body>
</html>
